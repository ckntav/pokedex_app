<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red top half -->
  <path d="M 5 50 A 45 45 0 0 1 95 50 Z" fill="#e63946"/>
  <!-- White bottom half -->
  <path d="M 5 50 A 45 45 0 0 0 95 50 Z" fill="white"/>
  <!-- Outer circle border -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Middle band -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Center button ring -->
  <circle cx="50" cy="50" r="12" fill="#1a1a1a"/>
  <!-- Center button inner -->
  <circle cx="50" cy="50" r="7" fill="white"/>
</svg>
